name: podchain_flutter
description: >
  Dart/Flutter mobile library for the PODCHAIN cryptographic proof-of-delivery
  protocol. Handles ECDSA P-256 key generation, secure key storage, delivery
  payload construction and signing, and offline queue management.
version: 1.0.0
homepage: https://github.com/podchain/podchain_flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # ECDSA P-256 signing and SHA-256 hashing via platform-native crypto.
  # BoringSSL on Android, Apple Security Framework on iOS.
  webcrypto: ^0.5.6

  # Hardware-backed secure storage.
  # Android: EncryptedSharedPreferences (backed by Android Keystore)
  # iOS: Keychain
  flutter_secure_storage: ^9.0.0

  # Connectivity monitoring for offline queue drain.
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Required for on-device benchmarking and integration testing.
  integration_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  mocktail: ^1.0.0

flutter:
  # Pure logic library — no UI assets.
